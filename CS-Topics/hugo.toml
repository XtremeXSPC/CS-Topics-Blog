# Main site configuration
baseURL = "https://lcs-developer.com/"
languageCode = "en-us"
title = "LCS.Developer"
theme = "stack"

# Enable robots.txt file generation
enableRobotsTXT = true

# Build settings: disable drafts, future, or expired content
buildDrafts = false
buildFuture = false
buildExpired = false

# Google Analytics configuration (using Hugo's internal async template for GA4)
googleAnalytics = "G-CPQPKX3QPR"

# Performance optimization settings
[minify]
  disableXML = true
  minifyOutput = true

# Main menu configuration
[menu]
  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30
  [[menu.main]]
    identifier = "archives"
    name = "Archive"
    url = "/archives/"
    weight = 40
  # Search functionality is often theme-specific.
  # You may need to check the Stack theme's documentation for how to implement it.
  # [[menu.main]]
  #   identifier = "search"
  #   name = "Search"
  #   url = "/search/"
  #   weight = 50

# Markup configuration for Goldmark and syntax highlighting
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      # Set to true to allow raw HTML in markdown files
      unsafe = true
  [markup.highlight]
    # Use CSS classes for syntax highlighting
    noClasses = false

# Parameters for the Stack theme
[params]
  # Main sections of the site (e.g., "post", "blog")
  mainSections = ["post"]
  
  # SEO metadata
  description = "Journey of a Computer Science Student"
  keywords = ["Blog", "Portfolio", "Computer Science", "Programming", "Technology"]
  author = "LCS.Dev"

  # Date format for published and last updated dates
  [params.dateFormat]
    published = "Jan 02, 2006"
    lastUpdated = "Jan 02, 2006 15:04 MST"

  # Sidebar configuration
  [params.sidebar]
    # Emoji to display at the top of the sidebar
    emoji = "👨‍💻"
    # Subtitle for the sidebar, taken from PaperMod's homeInfoParams
    subtitle = """
    Hi! I'm LCS.Dev, a Computer Science student passionate about programming, 
    technology, and free software.
    """
    # Avatar configuration
    [params.sidebar.avatar]
      enabled = true
      local = true
      # You can change this to your avatar image path, e.g., "images/LCS.Dev-Logo.jpg"
      src = "img/avatar.png" 

  # Article page configuration
  [params.article]
    # Enable KaTeX for math typesetting (inline and block) as requested
    math = true
    # Show Table of Contents on articles
    toc = true
    # Show reading time estimate
    readingTime = true
    # License configuration (currently disabled as in the old config)
    [params.article.license]
      enabled = false
      default = "Licensed under CC BY-NC-SA 4.0"

  # Comments configuration (disabled)
  [params.comments]
    enabled = true
    # You can configure a provider like 'disqus' or 'giscus' here
    provider = "disqus" 

  # Color scheme configuration
  [params.colorScheme]
    # Display the dark mode toggle switch
    toggle = true
    # Set the default theme: "auto", "light", or "dark"
    default = "auto"
    
  # Social media links
  [[params.social]]
    name = "GitHub"
    url = "https://github.com/XtremeXSPC"
  [[params.social]]
    name = "X"
    url = "https://x.com/"
  [[params.social]]
    name = "Stackoverflow"
    url = "https://stackoverflow.com"
    
  # OpenGraph and Twitter Card settings
  [params.opengraph]
    [params.opengraph.twitter]
      # Card type: summary, summary_large_image
      card = "summary_large_image"
      # Your Twitter username (optional)
      # site = "@username"

  # Default OpenGraph image for sharing links
  [params.defaultImage]
    [params.defaultImage.opengraph]
      enabled = true
      # Set to true if the image is in your local `assets` directory
      local = true
      src = "/images/LCS.Dev-Logo.jpg"
