# Main site configuration
baseURL = "https://lcs-developer.com/"
languageCode = "en-us"
title = "LCS.Developer"
theme = "stack"
pagination.pagerSize = 5
DefaultContentLanguage = "en"
copyright = "LCS.Developer"

# Enable robots.txt file generation
enableRobotsTXT = true

# Build settings
buildDrafts = false
buildFuture = false
buildExpired = false

# Google Analytics configuration
[services]
    [services.googleAnalytics]
        id = "G-CPQPKX3QPR"

# Output formats, JSON is necessary for search
[outputs]
    home = ["HTML", "RSS", "JSON"]

# Permalink structure for cleaner URLs
[permalinks]
    post = "/p/:slug/"
    page = "/:slug/"

# All theme parameters
[params]
    mainSections = ["posts", "post"]
    featuredImageField = "image"
    rssFullContent = true

    # Date format
    [params.dateFormat]
        published = "Jan 02, 2006"
        lastUpdated = "Jan 02, 2006 15:04 MST"

    # Sidebar configuration
    [params.sidebar]
        emoji = "👨‍💻"
        subtitle = "Hi! I'm LCS.Dev, a CS student passionate about programming, technology, and free software."
        [params.sidebar.avatar]
            enabled = true
            local = true
            src = "images/LCS.Dev-Logo.jpg"

    # Article page configuration
    [params.article]
        math = true
        toc = true
        readingTime = true
        [params.article.license]
            enabled = false
            default = "Licensed under CC BY-NC-SA 4.0"

    # Comments configuration
    [params.comments]
        enabled = false
        provider = "disqus"

    # Color scheme
    [params.colorScheme]
        toggle = true
        default = "auto"

    # Widgets configuration for right sidebar
    [params.widgets]
        [[params.widgets.homepage]]
            type = "search"
        [[params.widgets.homepage]]
            type = "archives"
            [params.widgets.homepage.params]
                limit = 5
        [[params.widgets.homepage]]
            type = "categories"
            [params.widgets.homepage.params]
                limit = 10
        [[params.widgets.homepage]]
            type = "tag-cloud"
            [params.widgets.homepage.params]
                limit = 10
        [[params.widgets.page]]
            type = "toc"

    # OpenGraph and Twitter Card settings
    [params.opengraph]
        [params.opengraph.twitter]
            card = "summary_large_image"

    # Default OpenGraph image
    [params.defaultImage]
        [params.defaultImage.opengraph]
            enabled = true
            local = true
            src = "images/LCS.Dev-Logo.jpg"

# Main menu
# Note: Categories and Tags are removed from here as they appear in the right sidebar
# Home, About, Archive, and Search are configured in their respective content files

# Social menu
[[menu.social]]
    identifier = "github"
    name = "GitHub"
    url = "https://github.com/XtremeXSPC"
    [menu.social.params]
        icon = "brand-github"
[[menu.social]]
    identifier = "x-twitter"
    name = "X (Twitter)"
    url = "https://x.com/"
    [menu.social.params]
        icon = "brand-twitter"

# Related content configuration
[related]
    includeNewer = true
    threshold = 60
    toLower = false
    [[related.indices]]
        name = "tags"
        weight = 100
    [[related.indices]]
        name = "categories"
        weight = 200

# Markdown rendering configuration
[markup]
    [markup.goldmark.renderer]
        unsafe = true
    [markup.tableOfContents]
        endLevel = 4
        ordered = false
        startLevel = 2
    [markup.highlight]
        noClasses = false
        codeFences = true
        guessSyntax = true
        lineNos = true
        lineNumbersInTable = true

